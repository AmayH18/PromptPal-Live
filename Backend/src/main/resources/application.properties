spring.application.name=backend

app.tracker.test-mode=false

# ======================
# MySQL Configuration
# ======================
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Hikari pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.connection-timeout=20000

# ======================
# OpenAI Config
# ======================
openai.api.key=${OPENAI_API_KEY}
openai.model=gpt-4o-mini
openai.max_tokens=800

# ======================
# RAG Config
# ======================
rag.knowledge-base.path=src/main/resources/Knowledge_Base.txt

# ======================
# Resend Email Config
# ======================
#resend.api.key=${RESEND_API_KEY}
#mail.from=onboarding@resend.dev

############################################
# Gmail SMTP
############################################

spring.mail.host=smtp.gmail.com
spring.mail.port=587

spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com

# ======================
# JWT Config
# ======================
jwt.secret=${JWT_SECRET}
jwt.expiration.ms=86400000

# ======================
# HuggingFace Config
# ======================
hf.api.key=${HF_API_KEY}
huggingface.model=tiiuae/falcon-7b-instruct

# ======================
# Profile
# ======================
spring.profiles.active=prod

# ======================
# Logging
# ======================
logging.level.promptpal=DEBUG
logging.level.org.springframework.security=INFO